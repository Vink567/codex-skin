<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Codex Skin Studio</title><link rel="stylesheet" href="./styles.css"></head>
<body><main class="studio-shell"><header class="topbar"><div class="brand-mark">✦</div><span>Codex Skin Studio</span></header>
<section class="workspace"><aside class="asset-panel"><div class="panel-heading"><span>素材库</span><small id="asset-count">0 个素材</small></div><button class="drop-zone" id="import-button" type="button"><span class="upload-symbol">↑</span><strong>导入主题资源包</strong><em>支持 Studio .zip 或 PNG、JPG、WEBP</em></button><div class="asset-list" id="asset-list"></div><div class="package-note"><span class="dot"></span><p><strong id="package-name">等待导入</strong><br>素材保存在本地应用数据目录。</p></div></aside>
<section class="preview-area"><div class="preview-toolbar"><div><strong id="preview-title">新建任务预览</strong><span id="module-status" hidden></span></div></div><div class="resource-frame" id="codex-frame"><div class="preview-empty" id="preview-empty"><div class="empty-mark">✦</div><strong>等待导入主题资源包</strong></div><div id="dom-preview" aria-label="Codex 新建任务 DOM 预览" hidden></div></div></section>
<aside class="controls-panel"><div class="panel-heading"><span>主题编辑器</span><small id="state-label">未选择</small></div><div class="selected-preview" id="selected-preview"><div class="placeholder-image">选择主题资源包</div></div><div class="editor-scroll">
<section class="editor-group"><div class="editor-title"><span>01</span><b>位图背景</b><small>主画布与遮罩</small></div><label class="field-label" for="overlay">背景遮罩 <output id="overlay-output">30%</output></label><input id="overlay" type="range" min="0" max="80" value="30"><label class="color-row"><span>背景遮罩</span><input data-theme-color="overlay" type="color" value="#fff9ee"></label><div class="fit-control"><span class="field-label">图片适配</span><div class="segmented" id="fit-control"><button class="selected" data-fit="cover">填充</button><button data-fit="contain">包含</button><button data-fit="fill">拉伸</button></div></div></section>
<section class="editor-group"><div class="editor-title"><span>02</span><b>表面样式</b><small>顶部标题栏、左侧栏</small></div><label class="color-row"><span>顶部栏</span><input data-theme-color="header" type="color" value="#fff8eb"></label><label class="color-row"><span>顶部栏分隔线</span><input data-theme-color="headerBorder" type="color" value="#7e572d"></label><label class="color-row"><span>左侧栏</span><input data-theme-color="sidebar" type="color" value="#fff8eb"></label></section>
<section class="editor-group"><div class="editor-title"><span>03</span><b>SVG 图标</b><small>导航、文件夹与小猫爪</small></div><label class="color-row"><span>导航图标</span><input data-theme-color="navIcon" type="color" value="#8a5a32"></label><label class="color-row"><span>项目文件夹图标</span><input data-theme-color="folder" type="color" value="#75451f"></label></section>
<section class="editor-group"><div class="editor-title"><span>04</span><b>新任务建议卡片</b><small>四张新任务建议卡片</small></div><div class="color-pairs"><label><input data-theme-color="card1" type="color" value="#e9f3fa">建议卡片 1</label><label><input data-theme-color="card2" type="color" value="#f4eefb">建议卡片 2</label><label><input data-theme-color="card3" type="color" value="#ebf5eb">建议卡片 3</label><label><input data-theme-color="card4" type="color" value="#fceede">建议卡片 4</label></div></section>
<section class="editor-group"><div class="editor-title"><span>05</span><b>Composer 输入组件</b><small>表面、描边、五个按钮</small></div><label class="color-row"><span>Composer 表面</span><input data-theme-color="composer" type="color" value="#fff9f0"></label><label class="color-row"><span>Composer 描边与聚焦光圈</span><input data-theme-color="composerBorder" type="color" value="#88542a"></label><div class="color-pairs"><label><input data-theme-color="add" type="color" value="#e8f3fa">附件按钮</label><label><input data-theme-color="permission" type="color" value="#ffebda">权限按钮</label><label><input data-theme-color="model" type="color" value="#f3edf9">模型按钮</label><label><input data-theme-color="mic" type="color" value="#ebf4e8">麦克风按钮</label><label><input data-theme-color="send" type="color" value="#b9683a">发送按钮</label></div></section>
<section class="editor-group"><div class="editor-title"><span>06</span><b>当前项目选择栏</b><small>项目条、描边、悬停</small></div><label class="color-row"><span>当前项目栏</span><input data-theme-color="projectBar" type="color" value="#faf0de"></label><label class="color-row"><span>项目选择控件</span><input data-theme-color="projectControl" type="color" value="#fffaf1"></label></section>
<section class="editor-group switches"><div class="editor-title"><span>启用项</span><b>区域开关</b></div><label><input data-feature="headerSurface" type="checkbox" checked>顶部标题栏</label><label><input data-feature="sidebarSurface" type="checkbox" checked>左侧栏</label><label><input data-feature="sidebarIcons" type="checkbox" checked>导航与文件夹图标</label><label><input data-feature="homeSuggestionCards" type="checkbox" checked>四张建议卡片</label><label><input data-feature="composerChrome" type="checkbox" checked>Composer</label><label><input data-feature="projectBarChrome" type="checkbox" checked>项目选择栏</label><label><input data-feature="removeTopFade" type="checkbox" checked>移除主画布顶部渐变</label></section></div><button class="primary-button" id="apply-button" disabled>应用全部区域到 Codex</button><button class="status-button" id="reset-button">恢复资源包默认设置</button><button class="status-button" id="status-button">检查当前状态</button><p class="safety-copy">右侧设置仅在“应用”时写入外部主题配置与 CSS；预览图保持资源包原样。</p></aside></section></main><div class="toast" id="toast" role="status"></div><script src="./renderer.js"></script></body></html>
